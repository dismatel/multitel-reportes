# .github/workflows/build-android.yml
# On push to main (or tag v*): EAS Build generates signed Android APK.

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-android.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options: [production, preview, development]

jobs:
  build:
    name: EAS Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure environment variables
        working-directory: app
        run: |
          cat > .env.local << EOF
          EXPO_PUBLIC_APIM_BASE_URL=${{ secrets.APIM_BASE_URL }}
          EXPO_PUBLIC_APIM_SUBSCRIPTION_KEY=${{ secrets.APIM_SUBSCRIPTION_KEY }}
          EXPO_PUBLIC_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          EXPO_PUBLIC_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          EXPO_PUBLIC_APP_ENV=production
          EOF

      - name: EAS Build — Android
        working-directory: app
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          eas build \
            --platform android \
            --profile $PROFILE \
            --non-interactive \
            --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Wait for build and download artifact
        working-directory: app
        run: |
          echo "Waiting for EAS build to complete..."
          eas build:list --platform android --status finished --limit 1 --json \
            | jq -r '.[0].artifacts.buildUrl // empty' \
            | xargs -I{} curl -L {} -o multitel-reportes.apk || true
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: multitel-reportes-${{ github.sha }}.apk
          path: app/multitel-reportes.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/multitel-reportes.apk
          name: "Multitel Reportes ${{ github.ref_name }}"
          body: |
            ## Multitel Reportes ${{ github.ref_name }}
            APK Android firmado para distribución interna.
            
            ### Instalación
            1. Descarga el APK adjunto
            2. Habilita "Instalar desde fuentes desconocidas" en Android
            3. Instala el APK
            4. Inicia sesión con tu cuenta @multitel.com
