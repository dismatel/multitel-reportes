# .github/workflows/build-android.yml
# On push to main or version tag: build signed Android APK via EAS.

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-android.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options: [production, preview, development]

jobs:
  build:
    name: EAS Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 22
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: 'app/package-lock.json'

      - name: Instalar dependencias Node
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Restaurar keystore desde secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/multitel.keystore

      - name: Configurar credenciales de firma
        working-directory: app
        run: |
          cat > credentials.json << EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "multitel.keystore",
                "keystorePassword": "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.ANDROID_KEY_ALIAS }}",
                "keyPassword": "${{ secrets.ANDROID_KEY_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Build APK con EAS
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile production --non-interactive --local \
            --output ../multitel-reportes.apk

      - name: Limpiar keystore y credenciales
        if: always()
        run: |
          rm -f app/multitel.keystore app/credentials.json

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4.4.3
        with:
          name: multitel-reportes-apk
          path: multitel-reportes.apk
          retention-days: 30

      - name: Crear Release en GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: multitel-reportes.apk
          body: |
            ## Multitel Reportes
            APK Android firmado para distribucion interna.

            ### Instalacion
            1. Descarga el APK adjunto
            2. Habilita "Instalar desde fuentes desconocidas" en Android
            3. Instala el APK
            4. Inicia sesion con tu cuenta @grupomultitel.com
