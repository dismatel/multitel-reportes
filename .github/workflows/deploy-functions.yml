# .github/workflows/deploy-functions.yml
# Autenticación via Service Principal (AZURE_CREDENTIALS)
# Build remoto activado para Python en Linux (oryx-build)

name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de despliegue'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  AZURE_FUNCTIONAPP_NAME: multitel-functions
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    name: Build y Deploy Azure Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login a Azure con Service Principal
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verificar Python y dependencias
        shell: bash
        run: |
          python --version
          pip install --upgrade pip
          pip install -r requirements.txt --dry-run

      - name: Desplegar Azure Functions via Service Principal
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Verificar despliegue
        run: |
          echo "✅ Deployment completado: ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          echo "📦 Functions: fn_guardar_reporte, fn_generar_pptx, fn_subir_onedrive, fn_notificar, fn_aprobar"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🔖 Commit: ${{ github.sha }}"
