# .github/workflows/deploy-functions.yml
# On push to main: package Python deps, deploy Azure Functions.
# Uses Publish Profile authentication (no service principal required).

name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de despliegue'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  AZURE_FUNCTIONAPP_NAME: multitel-functions
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './functions'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    name: Build y Deploy Azure Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias Python
        shell: bash
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: Instalar LibreOffice para conversion PDF
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libreoffice libreoffice-impress

      - name: Desplegar Azure Functions via Publish Profile
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Verificar despliegue
        run: |
          echo "Deployment completed for ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          echo "Functions deployed: fn_guardar_reporte, fn_generar_pptx, fn_subir_onedrive, fn_notificar, fn_aprobar"
